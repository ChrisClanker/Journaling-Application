<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
        }
        .form-container {
            max-width: 500px;
            margin: 50px auto;
        }
    </style>
</head>
<body>
<script>
    function getCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for(var i=0;i < ca.length;i++) {
            var c = ca[i];
            while (c.charAt(0)==' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const htmlElement = document.documentElement;
        const isDarkMode = getCookie('dark') === 'True';
        if (isDarkMode) {
            htmlElement.setAttribute('data-bs-theme', 'dark');
        }
    });
</script>

<div class="container mt-5">
    <div class="form-container">
        <h1 class="mb-4">Change Password</h1>
        <a href="{% url 'profile' %}" class="btn btn-secondary mb-3">Back to Profile</a>
        <button id="darkModeToggle" class="btn btn-secondary mb-3"></button>

        <form method="POST" action="{% url 'password_change' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_old_password" class="form-label">Old Password</label>
                <input type="password" name="old_password" class="form-control" id="id_old_password" required>
            </div>
            <div class="mb-3">
                <label for="id_new_password1" class="form-label">New Password</label>
                <input type="password" name="new_password1" class="form-control" id="id_new_password1" required>
            </div>
            <div class="mb-3">
                <label for="id_new_password2" class="form-label">Confirm New Password</label>
                <input type="password" name="new_password2" class="form-control" id="id_new_password2" required>
            </div>
            {% if form.errors %}
            <div class="alert alert-danger">
                {% for field in form %}
                    {% for error in field.errors %}
                        <p class="mb-0">{{ error }}</p>
                    {% endfor %}
                {% endfor %}
                {% for error in form.non_field_errors %}
                    <p class="mb-0">{{ error }}</p>
                {% endfor %}
            </div>
            {% endif %}
            <button type="submit" class="btn btn-primary">Change Password</button>
        </form>
    </div>
</div>

<script>
    function setCookie(name, value, days) {
        var expires = "";
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days*24*60*60*1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "")  + expires + "; path=/";
    }

    function getCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for(var i=0;i < ca.length;i++) {
            var c = ca[i];
            while (c.charAt(0)==' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const darkModeToggle = document.getElementById('darkModeToggle');
        const isDarkMode = getCookie('dark') === 'True';
        if (isDarkMode) {
            darkModeToggle.innerText = '\u2600\ufe0f';
            darkModeToggle.onclick = function() {
                setCookie('dark', 'False', 365);
                window.location.reload();
            };
        } else {
            darkModeToggle.innerText = '\ud83c\udf15';
            darkModeToggle.onclick = function() {
                setCookie('dark', 'True', 365);
                window.location.reload();
            };
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
