<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Report - My Journal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
        }
    </style>
</head>
<body>
<script>
    function getCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for(var i=0;i < ca.length;i++) {
            var c = ca[i];
            while (c.charAt(0)==' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const htmlElement = document.documentElement;
        const isDarkMode = getCookie('dark') === 'True';
        if (isDarkMode) {
            htmlElement.setAttribute('data-bs-theme', 'dark');
        }
    });
</script>

<div class="container mt-5">
    {% include 'nav.html' %}
    <h1 class="mb-4">Monthly Report: {{ year }}/{{ month }}</h1>

    <div class="alert alert-info">
        <p class="mb-0">No journal entries found for this month. Start journaling to generate a monthly report!</p>
    </div>

    <a href="{% url 'monthly_report_list' %}" class="btn btn-secondary">Back to Monthly Reports</a>
</div>

<script>
    function setCookie(name, value, days) {
        var expires = "";
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days*24*60*60*1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "")  + expires + "; path=/";
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const darkModeToggle = document.getElementById('darkModeToggle');
        if (darkModeToggle) {
            const isDarkMode = getCookie('dark') === 'True';
            if (isDarkMode) {
                darkModeToggle.innerText = '☀️';
                darkModeToggle.onclick = function() {
                    setCookie('dark', 'False', 365);
                    window.location.reload();
                };
            } else {
                darkModeToggle.innerText = '🌕';
                darkModeToggle.onclick = function() {
                    setCookie('dark', 'True', 365);
                    window.location.reload();
                };
            }
        }
    });
</script>

</body>
</html>
