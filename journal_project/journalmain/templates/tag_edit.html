<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Tag - My Journal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
        }
    </style>
</head>
<body>
<script>
    function getCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for(var i=0;i < ca.length;i++) {
            var c = ca[i];
            while (c.charAt(0)==' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const htmlElement = document.documentElement;
        const isDarkMode = getCookie('dark') === 'True';
        if (isDarkMode) {
            htmlElement.setAttribute('data-bs-theme', 'dark');
        }
    });
</script>

<div class="container mt-5">
    {% include 'nav.html' %}
    <h1 class="mb-4">Edit Tag</h1>
    <a href="{% url 'tag_list' %}" class="btn btn-secondary mb-3">Back to Tags</a>
    <button id="darkModeToggle" class="btn btn-secondary mb-3 ms-2"></button>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="name" class="form-label">Tag Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ tag.name }}" required>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{% url 'tag_list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>

<script>
    function setCookie(name, value, days) {
        var expires = "";
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days*24*60*60*1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "")  + expires + "; path=/";
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const darkModeToggle = document.getElementById('darkModeToggle');
        const isDarkMode = getCookie('dark') === 'True';
        if (isDarkMode) {
            darkModeToggle.innerText = '\u2600\uFE0F';
            darkModeToggle.onclick = function() {
                setCookie('dark', 'False', 365);
                window.location.reload();
            };
        } else {
            darkModeToggle.innerText = '\uD83C\uDF15';
            darkModeToggle.onclick = function() {
                setCookie('dark', 'True', 365);
                window.location.reload();
            };
        }
    });
</script>

</body>
</html>
