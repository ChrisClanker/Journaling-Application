<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Reviews - My Journal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<script>
    function getCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for(var i=0;i < ca.length;i++) {
            var c = ca[i];
            while (c.charAt(0)==' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const htmlElement = document.documentElement;
        const isDarkMode = getCookie('dark') === 'True';
        if (isDarkMode) {
            htmlElement.setAttribute('data-bs-theme', 'dark');
        }
    });
</script>

<div class="container mt-5">
    {% include 'nav.html' %}
    <h1 class="mb-4">Annual Reviews</h1>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary mb-3">Back to Dashboard</a>
    <button id="darkModeToggle" class="btn btn-secondary mb-3 ms-2"></button>

    {% if years %}
        <div class="list-group">
            {% for y in years %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <h5 class="mb-0">{{ y.year }}</h5>
                <div>
                    {% if y.has_report %}
                        <a href="{% url 'report_list' %}" class="btn btn-sm btn-success">View Report</a>
                    {% else %}
                        <form method="post" action="{% url 'generate_annual_review' y.year %}" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-primary">Generate Review</button>
                        </form>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-muted">No journal entries yet. Start journaling to generate annual reviews!</p>
    {% endif %}
</div>

<script>
    function setCookie(name, value, days) {
        var expires = "";
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days*24*60*60*1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "")  + expires + "; path=/";
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const darkModeToggle = document.getElementById('darkModeToggle');
        const isDarkMode = getCookie('dark') === 'True';
        if (isDarkMode) {
            darkModeToggle.innerText = '\u2600\uFE0F';
            darkModeToggle.onclick = function() {
                setCookie('dark', 'False', 365);
                window.location.reload();
            };
        } else {
            darkModeToggle.innerText = '\uD83C\uDF15';
            darkModeToggle.onclick = function() {
                setCookie('dark', 'True', 365);
                window.location.reload();
            };
        }
    });
</script>

</body>
</html>
