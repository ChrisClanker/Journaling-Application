<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag: {{ tag.name }} - My Journal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
        }
    </style>
</head>
<body>
<script>
    function getCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for(var i=0;i < ca.length;i++) {
            var c = ca[i];
            while (c.charAt(0)==' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const htmlElement = document.documentElement;
        const isDarkMode = getCookie('dark') === 'True';
        if (isDarkMode) {
            htmlElement.setAttribute('data-bs-theme', 'dark');
        }
    });
</script>

<div class="container mt-5">
    <h1 class="mb-4">Tag: {{ tag.name }}</h1>
    <a href="{% url 'tag_list' %}" class="btn btn-secondary mb-3">Back to Tags</a>
    <button id="darkModeToggle" class="btn btn-secondary mb-3 ms-2"></button>

    {% if entries %}
        <div class="list-group">
            {% for entry in entries %}
            <a href="{% url 'journal_detail' entry.id %}" class="list-group-item list-group-item-action">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1">{{ entry.title|default:"Untitled" }}</h5>
                    <small>{{ entry.date }}</small>
                </div>
                <p class="mb-1">{{ entry.content|truncatewords:30 }}</p>
            </a>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-muted">No journal entries with this tag.</p>
    {% endif %}
</div>

<script>
    function setCookie(name, value, days) {
        var expires = "";
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days*24*60*60*1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "")  + expires + "; path=/";
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const darkModeToggle = document.getElementById('darkModeToggle');
        const isDarkMode = getCookie('dark') === 'True';
        if (isDarkMode) {
            darkModeToggle.innerText = '☀️';
            darkModeToggle.onclick = function() {
                setCookie('dark', 'False', 365);
                window.location.reload();
            };
        } else {
            darkModeToggle.innerText = '🌕';
            darkModeToggle.onclick = function() {
                setCookie('dark', 'True', 365);
                window.location.reload();
            };
        }
    });
</script>

</body>
</html>
