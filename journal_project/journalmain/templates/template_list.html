<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal Templates</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
        }
    </style>
</head>
<body>
<script>
    function getCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for(var i=0;i < ca.length;i++) {
            var c = ca[i];
            while (c.charAt(0)==' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }

    document.addEventListener('DOMContentLoaded', (event) => {
        const htmlElement = document.documentElement;
        const isDarkMode = getCookie('dark') === 'True';
        if (isDarkMode) {
            htmlElement.setAttribute('data-bs-theme', 'dark');
        }
    });
</script>

<div class="container mt-5">
    {% include 'nav.html' %}
    <h1 class="mb-4">Journal Templates</h1>
    <p class="text-muted">Choose a template to get started with your journal entry.</p>

    {% if templates %}
    <div class="list-group">
        {% for template in templates %}
        <div class="list-group-item">
            <div class="d-flex w-100 justify-content-between">
                <h5 class="mb-1">{{ template.name }}</h5>
                <a href="{% url 'journal_create' %}?template={{ template.id }}" class="btn btn-primary btn-sm">Use Template</a>
            </div>
            <p class="mb-1">{{ template.description }}</p>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-muted">No templates available.</p>
    {% endif %}

    <a href="{% url 'journal_create' %}" class="btn btn-secondary mt-3">Create Blank Entry</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
